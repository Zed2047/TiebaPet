name: Build Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "pyinstaller>=6,<7"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python tests\smoke_test.py
          python tests\core_test.py

      - name: Build portable app
        run: >-
          python -m PyInstaller --noconfirm --clean --windowed --contents-directory "."
          --name "TiebaPet"
          --add-data "assets;assets"
          --add-data "data;data"
          --add-data "extensions;extensions"
          main.py

      - name: Package portable app
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -LiteralPath "dist\TiebaPet" -DestinationPath "release\TiebaPet-${{ github.ref_name }}-win64.zip" -CompressionLevel Optimal

      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "release\TiebaPet-${{ github.ref_name }}-win64.zip" --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "TiebaPet ${{ github.ref_name }}" --generate-notes
